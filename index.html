<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VegaBox</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<header class="topbar" role="banner">
  <div class="logo">VegaBox</div>
  <input type="text" id="searchBar" placeholder="Search shows..." aria-label="Search shows">
</header>

<!-- HERO -->
<section class="hero" role="region" aria-label="Featured show">
  <div class="hero-content">
    <h1>Jujutsu Kaisen</h1>
    <p>Follow Yuji Itadori as he battles powerful curses.</p>
    <a class="hero-btn" href="player.html?video=videos/show1.mp4">▶ Watch Now</a>
  </div>
</section>

<!-- MAIN CONTENT -->
<main class="container" role="main">
  <h2 class="section-title">Popular</h2>

  <section class="shows-grid" id="showsGrid" aria-label="Popular shows">

    <!-- Show Card -->
    <article class="show-card">
      <div class="thumbnail">
        <img src="thumbnails/thumb1.jpg" alt="Jujutsu Kaisen" loading="lazy">
        <a class="play-overlay" href="player.html?video=videos/show1.mp4">▶</a>
      </div>
      <h3>Jujutsu Kaisen</h3>
    </article>

    <article class="show-card">
      <div class="thumbnail">
        <img src="thumbnails/thumb2.jpg" alt="Jujutsu Kaisen Season 3" loading="lazy">
        <a class="play-overlay" href="player.html?video=videos/show2.mp4">▶</a>
      </div>
      <h3>Jujutsu Kaisen Season 3</h3>
    </article>

  </section>
</main>

<script src="search.js"></script>
</body>
</html>
